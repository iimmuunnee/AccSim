<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0A0A0C"/>
  <!-- 3x3 PE grid with gradient + glow -->
  <g filter="url(#glow)">
    <!-- Row 0 -->
    <rect x="3" y="3" width="7" height="7" rx="1.2" fill="url(#g)" opacity="1.0"/>
    <rect x="12.5" y="3" width="7" height="7" rx="1.2" fill="url(#g)" opacity="0.75"/>
    <rect x="22" y="3" width="7" height="7" rx="1.2" fill="url(#g)" opacity="0.55"/>
    <!-- Row 1 -->
    <rect x="3" y="12.5" width="7" height="7" rx="1.2" fill="url(#g)" opacity="0.75"/>
    <rect x="12.5" y="12.5" width="7" height="7" rx="1.2" fill="url(#g)" opacity="0.55"/>
    <rect x="22" y="12.5" width="7" height="7" rx="1.2" fill="url(#g)" opacity="0.4"/>
    <!-- Row 2 -->
    <rect x="3" y="22" width="7" height="7" rx="1.2" fill="url(#g)" opacity="0.55"/>
    <rect x="12.5" y="22" width="7" height="7" rx="1.2" fill="url(#g)" opacity="0.4"/>
    <rect x="22" y="22" width="7" height="7" rx="1.2" fill="url(#g)" opacity="0.35"/>
  </g>
</svg>
